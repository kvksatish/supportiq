<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocked Host - Widget E2E Test</title>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
    h1 { color: #333; }
    .info { background: #fef2f2; padding: 16px; border-radius: 8px; margin: 20px 0; }
    .status { color: #dc2626; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Blocked Host - E2E Test Page</h1>
  <div class="info">
    <p>This page is a <span class="status">BLOCKED</span> origin for the Basjoo widget.</p>
    <p>The widget may appear as a button, but sending a message should result in an "origin not allowed" error.</p>
  </div>
  <p>Use this page for Playwright E2E tests that verify widget origin whitelist enforcement.</p>

  <!-- Widget SDK - agentId from URL params, apiBase from backend -->
  <script>
    // Read agentId from URL query params (passed by Playwright test)
    var urlParams = new URLSearchParams(window.location.search);
    var agentId = urlParams.get('agentId') || '';
    var apiBase = 'http://localhost:8000';
    var sdkUrl = '/sdk.js?agentId=' + encodeURIComponent(agentId) + '&apiBase=' + encodeURIComponent(apiBase) + '&themeColor=%233B82F6';
    document.write('<scr' + 'ipt src="' + sdkUrl + '"></scr' + 'ipt>');
  </script>
</body>
</html>
